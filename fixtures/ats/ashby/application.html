<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Frontend Engineer - Fixture Co | Ashby</title>
    <meta name="ats-family" content="ashby" />
  </head>
  <body data-ashby-job-board>
    <div id="root" class="ashby-application">
      <header>
        <h1>Frontend Engineer</h1>
        <div class="company">Fixture Co</div>
      </header>

      <form
        id="application"
        method="post"
        action="/fixtures/ashby/submit"
        enctype="multipart/form-data"
      >
        <div class="ashby-field" data-field="firstName">
          <label for="firstName">First Name *</label>
          <input type="text" id="firstName" name="firstName" required />
        </div>

        <div class="ashby-field" data-field="lastName">
          <label for="lastName">Last Name *</label>
          <input type="text" id="lastName" name="lastName" required />
        </div>

        <div class="ashby-field" data-field="email">
          <label for="email">Email *</label>
          <input type="email" id="email" name="email" required />
        </div>

        <div class="ashby-field" data-field="phone">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" />
        </div>

        <div class="ashby-field" data-field="resume">
          <label for="resume">Resume *</label>
          <input type="file" id="resume" name="resume" accept=".pdf" required />
        </div>

        <div class="ashby-field" data-field="linkedin">
          <label for="linkedin">LinkedIn URL</label>
          <input type="url" id="linkedin" name="linkedin" />
        </div>

        <div class="ashby-field" data-field="location">
          <label for="location">Location *</label>
          <input type="text" id="location" name="location" required />
        </div>

        <div class="ashby-field" data-field="custom_visa">
          <fieldset>
            <legend>Will you require sponsorship? *</legend>
            <label><input type="radio" name="custom_visa" value="yes" required /> Yes</label>
            <label><input type="radio" name="custom_visa" value="no" /> No</label>
          </fieldset>
        </div>

        <button type="submit" class="ashby-submit-button">Submit Application</button>
      </form>
    </div>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Staff Engineer - Fixture Co | Lever</title>
    <meta name="ats-family" content="lever" />
  </head>
  <body class="posting-apply" data-posting="fixture-staff-engineer">
    <div class="posting-wrapper">
      <div class="posting-headline">
        <h2>Apply for this job</h2>
        <h3>Staff Engineer — Fixture Co</h3>
      </div>

      <form
        class="application-form"
        method="post"
        action="/fixtures/lever/submit"
        enctype="multipart/form-data"
      >
        <div class="application-question">
          <label for="name">Full name *</label>
          <input type="text" id="name" name="name" required />
        </div>

        <div class="application-question">
          <label for="email">Email *</label>
          <input type="email" id="email" name="email" required />
        </div>

        <div class="application-question">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" />
        </div>

        <div class="application-question">
          <label for="resume">Resume / CV *</label>
          <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx" required />
        </div>

        <div class="application-question">
          <label for="org">Current company</label>
          <input type="text" id="org" name="org" />
        </div>

        <div class="application-additional">
          <label for="additional">Additional information</label>
          <textarea id="additional" name="additional" rows="4"></textarea>
        </div>

        <div class="application-question">
          <label for="consent_privacy">
            <input type="checkbox" id="consent_privacy" name="consent_privacy" value="yes" required />
            I agree to the privacy policy *
          </label>
        </div>

        <button type="submit" class="template-btn-submit">Submit application</button>
      </form>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <title>Fixture Greenhouse Application</title>
  </head>
  <body>
    <main>
      <h1>Software Engineer</h1>
      <form id="application-form">
        <label for="first-name">First name</label>
        <input id="first-name" name="first_name" type="text" />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" />

        <label for="resume">Resume</label>
        <input id="resume" name="resume" type="file" />

        <label for="work-auth">Work authorization</label>
        <select id="work-auth" name="work_authorization">
          <option value="">Choose</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>

        <button id="continue" type="button">Continue</button>
        <button id="submit-application" type="submit">Submit</button>
      </form>
    </main>
  </body>
</html>

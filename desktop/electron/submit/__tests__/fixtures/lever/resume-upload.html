<!doctype html>
<main data-provider="lever">
  <form aria-label="Lever resume upload">
    <label>Full name <input id="name" name="name" required></label>
    <label>Email <input name="email" type="email" required></label>
    <label>Resume/CV <input id="resume" name="resume" type="file" accept=".pdf" required></label>
    <button id="btn-submit" type="submit" data-qa="btn-submit">Submit application</button>
  </form>
</main>

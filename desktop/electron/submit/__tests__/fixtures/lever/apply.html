<!doctype html>
<main data-provider="lever">
  <h1>Software Engineer</h1>
  <form aria-label="Lever application">
    <label>Full name <input id="name" name="name" required></label>
    <label>Email <input name="email" type="email" required></label>
    <label>Phone <input name="phone" type="tel" required></label>
    <label>Resume <input id="resume" name="resume" type="file" accept=".pdf" required></label>
    <button id="btn-submit" type="submit" data-qa="btn-submit">Submit application</button>
  </form>
</main>

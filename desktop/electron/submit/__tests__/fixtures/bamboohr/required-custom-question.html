<!doctype html>
<main data-provider="bamboohr">
  <form aria-label="BambooHR custom question">
    <label>First name <input name="firstName" required></label>
    <label>Will you now or in the future need sponsorship? *
      <select name="custom_sponsorship" required>
        <option value="">Choose</option>
        <option>No</option>
        <option>Yes</option>
      </select>
    </label>
    <button type="submit" data-testid="submit-candidate">Submit application</button>
  </form>
</main>

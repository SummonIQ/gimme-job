<!doctype html>
<main data-provider="bamboohr">
  <h1>Software Engineer</h1>
  <form aria-label="BambooHR application">
    <label>First name <input name="firstName" required></label>
    <label>Last name <input name="lastName" required></label>
    <label>Email <input name="email" type="email" required></label>
    <label>Phone <input name="phone" type="tel" required></label>
    <label>Resume <input name="resume" type="file" accept=".pdf" required></label>
    <button type="submit" data-testid="submit-candidate">Submit application</button>
  </form>
</main>

<!doctype html>
<main data-provider="bamboohr">
  <form aria-label="BambooHR resume upload">
    <label>Email <input name="email" type="email" required></label>
    <label>Resume/CV <input name="resume" type="file" accept=".pdf" required></label>
    <button type="submit" data-testid="submit-candidate">Submit application</button>
  </form>
</main>

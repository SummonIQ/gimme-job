<!doctype html>
<main data-provider="breezy">
  <form aria-label="Breezy resume upload">
    <label>Email <input name="email" type="email" required></label>
    <label>Resume/CV <input name="resume" type="file" accept=".pdf" required></label>
    <button type="submit" data-testid="candidate-submit">Submit application</button>
  </form>
</main>

<!doctype html>
<main data-provider="personio">
  <h1>Software Engineer</h1>
  <form aria-label="Personio application">
    <label>First name <input name="first_name" required></label>
    <label>Last name <input name="last_name" required></label>
    <label>Email <input name="email" type="email" required></label>
    <label>Phone <input name="phone" type="tel" required></label>
    <label>Resume <input name="documents[cv]" type="file" accept=".pdf" required></label>
    <button type="submit" data-testid="application-submit">Submit application</button>
  </form>
</main>

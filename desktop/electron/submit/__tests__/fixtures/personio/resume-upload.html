<!doctype html>
<main data-provider="personio">
  <form aria-label="Personio resume upload">
    <label>Email <input name="email" type="email" required></label>
    <label>Resume/CV <input name="documents[cv]" type="file" accept=".pdf" required></label>
    <button type="submit" data-testid="application-submit">Submit application</button>
  </form>
</main>

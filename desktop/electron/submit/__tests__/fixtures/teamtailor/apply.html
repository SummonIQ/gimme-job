<!doctype html>
<main data-provider="teamtailor">
  <h1>Software Engineer</h1>
  <form aria-label="Teamtailor application">
    <label>First name <input name="candidate[first_name]" required></label>
    <label>Last name <input name="candidate[last_name]" required></label>
    <label>Email <input name="candidate[email]" type="email" required></label>
    <label>Phone <input name="candidate[phone]" type="tel" required></label>
    <label>Resume <input name="candidate[resume]" type="file" accept=".pdf" required></label>
    <button type="submit" data-controller="submit-button">Send application</button>
  </form>
</main>

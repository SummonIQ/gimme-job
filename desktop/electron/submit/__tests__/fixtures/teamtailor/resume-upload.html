<!doctype html>
<main data-provider="teamtailor">
  <form aria-label="Teamtailor resume upload">
    <label>Email <input name="candidate[email]" type="email" required></label>
    <label>Resume/CV <input name="candidate[resume]" type="file" accept=".pdf" required></label>
    <button type="submit" data-controller="submit-button">Send application</button>
  </form>
</main>

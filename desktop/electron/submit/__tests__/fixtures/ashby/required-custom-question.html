<!doctype html>
<main data-provider="ashby">
  <form aria-label="Ashby custom question">
    <label>Full name <input name="_systemfield_name" required></label>
    <fieldset>
      <legend>Are you legally authorized to work in the United States? *</legend>
      <label><input type="radio" name="authorized" value="yes" required> Yes</label>
      <label><input type="radio" name="authorized" value="no"> No</label>
    </fieldset>
    <button type="submit" data-testid="submit-application">Submit Application</button>
  </form>
</main>

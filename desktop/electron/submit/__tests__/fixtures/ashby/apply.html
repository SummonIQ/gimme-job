<!doctype html>
<main data-provider="ashby">
  <h1>Software Engineer</h1>
  <form aria-label="Ashby application">
    <label>Full name <input name="_systemfield_name" required></label>
    <label>Email <input name="_systemfield_email" type="email" required></label>
    <label>Phone <input name="_systemfield_phone" type="tel" required></label>
    <label>Resume <input name="_systemfield_resume" type="file" accept=".pdf" required></label>
    <button type="submit" data-testid="submit-application">Submit Application</button>
  </form>
</main>

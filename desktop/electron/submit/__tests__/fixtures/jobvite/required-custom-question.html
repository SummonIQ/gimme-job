<!doctype html>
<main data-provider="jobvite">
  <form aria-label="Jobvite custom question">
    <label>First name <input id="jv-firstname" name="firstName" required></label>
    <label>Preferred location *
      <select name="preferredLocation" required>
        <option value="">Select</option>
        <option>Remote</option>
        <option>New York</option>
      </select>
    </label>
    <button type="submit" id="jv-submit">Submit application</button>
  </form>
</main>

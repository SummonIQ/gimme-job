<!doctype html>
<main data-provider="jobvite">
  <h1>Software Engineer</h1>
  <form aria-label="Jobvite application">
    <label>First name <input id="jv-firstname" name="firstName" required></label>
    <label>Last name <input id="jv-lastname" name="lastName" required></label>
    <label>Email <input id="jv-email" name="email" type="email" required></label>
    <label>Phone <input id="jv-phone" name="phone" type="tel" required></label>
    <label>Resume <input id="jv-resume" name="resume" type="file" accept=".pdf" required></label>
    <button type="submit" id="jv-submit">Submit application</button>
  </form>
</main>

<!doctype html>
<main data-provider="workable">
  <form aria-label="Workable custom question">
    <label>First name <input id="firstname" name="firstname" required></label>
    <label>Are you willing to relocate? *
      <select name="relocation" required>
        <option value="">Choose</option>
        <option>Yes</option>
        <option>No</option>
      </select>
    </label>
    <button type="submit" data-ui="submit-application">Submit application</button>
  </form>
</main>

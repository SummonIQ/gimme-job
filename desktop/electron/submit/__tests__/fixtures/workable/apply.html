<!doctype html>
<main data-provider="workable">
  <h1>Software Engineer</h1>
  <form aria-label="Workable application">
    <label>First name <input id="firstname" name="firstname" required></label>
    <label>Last name <input id="lastname" name="lastname" required></label>
    <label>Email <input id="email" name="email" type="email" required></label>
    <label>Phone <input id="phone" name="phone" type="tel" required></label>
    <label>Resume <input id="resume" name="resume" type="file" accept=".pdf" required></label>
    <button type="submit" data-ui="submit-application">Submit application</button>
  </form>
</main>

<!doctype html>
<main data-provider="smartrecruiters">
  <form aria-label="SmartRecruiters custom question">
    <label>First name <input id="firstName" name="firstName" required></label>
    <fieldset>
      <legend>Do you have security clearance? *</legend>
      <label><input type="radio" name="clearance" value="yes" required> Yes</label>
      <label><input type="radio" name="clearance" value="no"> No</label>
    </fieldset>
    <button type="submit" data-test-id="apply-submit">Apply now</button>
  </form>
</main>

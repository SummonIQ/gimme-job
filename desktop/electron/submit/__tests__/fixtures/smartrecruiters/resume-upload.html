<!doctype html>
<main data-provider="smartrecruiters">
  <form aria-label="SmartRecruiters resume upload">
    <label>Email <input id="email" name="email" type="email" required></label>
    <label>Resume/CV <input data-test-id="resume-upload" type="file" accept=".pdf" required></label>
    <button type="submit" data-test-id="apply-submit">Apply now</button>
  </form>
</main>

<!doctype html>
<main data-provider="smartrecruiters">
  <h1>Software Engineer</h1>
  <form aria-label="SmartRecruiters application">
    <label>First name <input id="firstName" name="firstName" required></label>
    <label>Last name <input id="lastName" name="lastName" required></label>
    <label>Email <input id="email" name="email" type="email" required></label>
    <label>Phone <input id="phoneNumber" name="phoneNumber" type="tel" required></label>
    <label>Resume <input name="resume" type="file" accept=".pdf" required></label>
    <button type="submit" data-test-id="apply-submit">Apply now</button>
  </form>
</main>

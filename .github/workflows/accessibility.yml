name: Accessibility Testing

on:
  push:
    branches: [ main, master, development ]
  pull_request:
    branches: [ main, master, development ]

jobs:
  a11y-tests:
    runs-on: ubuntu-latest
    env:
      A11Y_TEST_MODE: 'true'
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps
      
      - name: Generate Prisma client
        run: bun db:generate
        
      - name: Run accessibility unit tests (Vitest) with coverage
        run: bunx vitest run __tests__/a11y --coverage

      - name: Run Playwright accessibility smoke tests (chromium)
        run: bunx playwright test tests/e2e/accessibility/ci-smoke.spec.ts --project=chromium
        
      - name: Upload accessibility test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-test-results
          path: ./accessibility-report.json
          if-no-files-found: ignore

      - name: Upload Vitest coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-vitest-coverage
          path: coverage/
          if-no-files-found: ignore

      - name: Upload Playwright accessibility artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps

      - name: Run Playwright accessibility tests
        run: bunx playwright test tests/e2e/accessibility/ --reporter=json
        continue-on-error: true

      - name: Upload Playwright accessibility test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-a11y-results
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright accessibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-a11y-report
          path: playwright-report/
          if-no-files-found: ignore
